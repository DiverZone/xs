<body translate="no">
  <body>
    <audio id="background-music" loop autoplay muted>
      <source
        src="mbp.mp3"
        type="audio/mpeg" />
      Your browser does not support the audio element.
    </audio>
    <button id="play-pause-button">
      <ion-icon class="audio-icon" id="play-music" name="play"></ion-icon>
      <ion-icon
        class="audio-icon hidden"
        id="pause-music"
        name="pause"></ion-icon>
    </button>
	


<script src='https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js'></script>
<script src='https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js'></script>
    <script id="rendered-js" >
const audio = document.getElementById("background-music");
const playPauseButton = document.getElementById("play-pause-button");
const playIcon = document.getElementById("play-music");
const pauseIcon = document.getElementById("pause-music");

let isPlaying = false;

function togglePlayPause() {
  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    playIcon.classList.remove("hidden");
    pauseIcon.classList.add("hidden");
  } else {
    const playPromise = audio.play();

    if (playPromise !== undefined) {
      playPromise
        .then(() => {
          isPlaying = true;
          playIcon.classList.add("hidden");
          pauseIcon.classList.remove("hidden");
        })
        .catch(() => {
          console.log("No se pudo reproducir");
        });
    }
  }
}

playPauseButton.addEventListener("click", togglePlayPause);

audio.addEventListener("ended", function () {
  audio.currentTime = 0;
  audio.play();
});

window.addEventListener("load", () => {
  audio.play().then(() => {
    // Se pudo reproducir automáticamente
    audio.muted = false; // quitamos mute
    isPlaying = true;
    playIcon.classList.add("hidden");
    pauseIcon.classList.remove("hidden");
  }).catch(() => {
    // El navegador bloqueó el autoplay
    console.log("Autoplay bloqueado");
  });
});

document.addEventListener("click", () => {
  if (!isPlaying) {
    audio.muted = false;
    audio.play();
    isPlaying = true;
    playIcon.classList.add("hidden");
    pauseIcon.classList.remove("hidden");
  }
}, { once: true });

window.addEventListener("load", () => {
  audio.muted = false;

  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise
      .then(() => {
        isPlaying = true;
        playIcon.classList.add("hidden");
        pauseIcon.classList.remove("hidden");
      })
      .catch((error) => {
        console.log("Autoplay bloqueado:", error);
        isPlaying = false;
      });
  }
});

window.addEventListener("load", () => {
  audio.play();
});



document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  alert("No puedes usar el click derecho 😎");
});


document.addEventListener('keydown', function(e) {
  if (e.key === "F12" || 
      (e.ctrlKey && e.shiftKey && e.key === "I") || 
      (e.ctrlKey && e.key === "U")) {
    e.preventDefault();
    alert("Inspección bloqueada 😎");
  }
});

</script>
